<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000099"/>
      <stop offset="100%" style="stop-color:#000066"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#80FFFF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#80FFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#80FFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background shield shape -->
  <rect x="2" y="2" width="196" height="76" rx="8" ry="8" fill="url(#navyGrad)" stroke="#80FFFF" stroke-width="1.5" opacity="0.95"/>
  
  <!-- Company name -->
  <text x="100" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">AJUVA</text>
  
  <!-- Tagline -->
  <text x="100" y="56" font-family="Tahoma, Arial, sans-serif" font-size="9" fill="#80FFFF" text-anchor="middle" letter-spacing="3">Š + S  s.r.o.</text>
  
  <!-- Bottom accent line -->
  <line x1="30" y1="65" x2="170" y2="65" stroke="url(#accentGrad)" stroke-width="1" opacity="0.6"/>
</svg>
